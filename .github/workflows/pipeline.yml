name: Build Data Pipeline

on:
  workflow_dispatch:
    inputs:
      langs:
        description: 'Languages to process (JSON array, e.g. ["sv"]). Omit to process all supported languages.'
        default: ""
        type: string
  schedule:
    # Monthly on the 1st at 03:00 UTC
    - cron: "0 3 1 * *"

permissions:
  contents: write
  actions: write

jobs:
  read-langs:
    runs-on: ubuntu-latest
    outputs:
      langs: ${{ steps.parse.outputs.langs }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            src/lang.ts
            .nvmrc
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - id: parse
        name: Read supported languages from src/lang.ts
        run: |
          langs=$(npx --yes tsx -e "import { SUPPORTED_LANGS } from './src/lang.ts'; console.log(JSON.stringify(SUPPORTED_LANGS))")
          echo "langs=$langs" >> "$GITHUB_OUTPUT"

  build-data:
    needs: read-langs
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      matrix:
        lang: ${{ fromJSON(inputs.langs || needs.read-langs.outputs.langs) }}
      max-parallel: 3

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Restore dump cache
        uses: actions/cache@v5
        with:
          path: data/dumps
          key: dumps-v1-${{ matrix.lang }}

      - name: Extract articles from Wikipedia dumps
        run: npm run extract -- --lang=${{ matrix.lang }}

      - name: Build tiled triangulation data
        run: npm run pipeline -- --lang=${{ matrix.lang }}

      - name: Compress data files
        run: |
          gzip --keep data/articles-${{ matrix.lang }}.json
          tar czf data/tiles-${{ matrix.lang }}.tar.gz -C data/tiles ${{ matrix.lang }}

      - name: Upload data artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-data-${{ matrix.lang }}-${{ github.run_id }}
          path: |
            data/articles-${{ matrix.lang }}.json.gz
            data/tiles-${{ matrix.lang }}.tar.gz
          retention-days: 90

  publish-release:
    needs: build-data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: pipeline-data-*

      - name: Download existing release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          gh release download data-latest --dir data --pattern 'tiles-*.tar.gz' || true

      - name: Merge with newly built files
        run: |
          # Overwrite only the languages that were rebuilt
          cp artifacts/*/tiles-*.tar.gz data/

      - name: Check total tile size against GitHub Pages limit
        run: |
          echo "## Tile Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Language | Compressed | Uncompressed |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-----------|--------------|" >> "$GITHUB_STEP_SUMMARY"

          total_uncompressed=0
          for archive in data/tiles-*.tar.gz; do
            lang=$(basename "$archive" | sed 's/^tiles-//;s/\.tar\.gz$//')
            compressed=$(stat --format=%s "$archive")
            uncompressed=$(gzip -l "$archive" | awk 'NR==2{print $2}')
            total_uncompressed=$((total_uncompressed + uncompressed))
            echo "| $lang | $(numfmt --to=iec "$compressed") | $(numfmt --to=iec "$uncompressed") |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total uncompressed: $(numfmt --to=iec $total_uncompressed)**" >> "$GITHUB_STEP_SUMMARY"

          warn_limit=838860800   # 800 MiB
          hard_limit=996147200   # 950 MiB

          if [ "$total_uncompressed" -gt "$hard_limit" ]; then
            echo "::error::Total uncompressed tile size ($(numfmt --to=iec $total_uncompressed)) exceeds 950 MiB hard limit — too large for GitHub Pages"
            exit 1
          elif [ "$total_uncompressed" -gt "$warn_limit" ]; then
            echo "::warning::Total uncompressed tile size ($(numfmt --to=iec $total_uncompressed)) exceeds 80% of GitHub Pages 1 GiB limit"
          fi

      - name: Publish data release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete data-latest --yes --cleanup-tag || true
          gh release create data-latest \
            --title "Pipeline Data ($(date -u +%Y-%m-%d))" \
            --notes "Auto-generated by pipeline workflow" \
            data/tiles-*.tar.gz

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml
