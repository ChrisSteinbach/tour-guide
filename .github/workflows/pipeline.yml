name: Build Data Pipeline

on:
  workflow_dispatch:
    inputs:
      langs:
        description: 'Languages to process (JSON array, e.g. ["sv"]). Omit to process all supported languages.'
        default: ""
        type: string
  schedule:
    # Monthly on the 1st at 03:00 UTC
    - cron: "0 3 1 * *"

permissions:
  contents: write
  actions: write

jobs:
  read-langs:
    runs-on: ubuntu-latest
    outputs:
      langs: ${{ steps.parse.outputs.langs }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: src/lang.ts
          sparse-checkout-cone-mode: false
      - id: parse
        name: Read supported languages from src/lang.ts
        run: |
          langs=$(sed -n '/SUPPORTED_LANGS = \[/,/\] as const/p' src/lang.ts | grep -oP '"[a-z]{2}"' | tr -d '"' | jq -R . | jq -sc .)
          echo "langs=$langs" >> "$GITHUB_OUTPUT"

  build-data:
    needs: read-langs
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      matrix:
        lang: ${{ fromJSON(inputs.langs || needs.read-langs.outputs.langs) }}
      max-parallel: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Restore dump cache
        uses: actions/cache@v4
        with:
          path: data/dumps
          key: dumps-v1-${{ matrix.lang }}

      - name: Extract articles from Wikipedia dumps
        run: npm run extract -- --lang=${{ matrix.lang }}

      - name: Build tiled triangulation data
        run: npm run pipeline -- --lang=${{ matrix.lang }}

      - name: Compress data files
        run: |
          gzip --keep data/articles-${{ matrix.lang }}.json
          tar czf data/tiles-${{ matrix.lang }}.tar.gz -C data/tiles ${{ matrix.lang }}

      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data-${{ matrix.lang }}-${{ github.run_id }}
          path: |
            data/articles-${{ matrix.lang }}.json.gz
            data/tiles-${{ matrix.lang }}.tar.gz
          retention-days: 90

  publish-release:
    needs: build-data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pipeline-data-*

      - name: Download existing release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          gh release download data-latest --dir data --pattern 'tiles-*.tar.gz' || true

      - name: Merge with newly built files
        run: |
          # Overwrite only the languages that were rebuilt
          cp artifacts/*/tiles-*.tar.gz data/

      - name: Publish data release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete data-latest --yes --cleanup-tag || true
          gh release create data-latest \
            --title "Pipeline Data ($(date -u +%Y-%m-%d))" \
            --notes "Auto-generated by pipeline workflow" \
            data/tiles-*.tar.gz

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml
