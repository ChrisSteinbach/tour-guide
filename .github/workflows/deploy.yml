name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download data from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          gh release download data-latest --pattern "tiles-*.tar.gz" --dir data

      - name: Extract tiles
        run: |
          mkdir -p data/tiles
          for archive in data/tiles-*.tar.gz; do
            tar xzf "$archive" -C data/tiles
          done

      - name: Build app
        run: npm run build

      - name: Copy data into build output
        run: cp -r data/tiles dist/app/tiles

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
