version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
      production:
        dependency-type: production
    ignore:
      # TODO: Remove this ignore rule once vite-plugin-pwa releases a version
      # that supports Vite 8. Check: npm view vite-plugin-pwa peerDependencies
      - dependency-name: vite
        versions: [">=8.0.0"]
