version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
      production:
        dependency-type: production
    ignore:
      # vite-plugin-pwa@1.2.0 doesn't support Vite 8 yet
      - dependency-name: vite
        versions: [">=8.0.0"]
